<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messendjer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, sans-serif; background: #f5f5f5; }
    .app { display: flex; height: 100%; }
    .sidebar { width: 300px; background: #fff; border-right: 1px solid #e5e5e5; display: flex; flex-direction: column; }
    .sidebar-header { background: #5181b8; padding: 15px; color: #fff; font-weight: 700; font-size: 16px; }
    .chat-list { flex: 1; overflow-y: auto; }
    .chat-item { padding: 12px 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
    .chat-item:hover { background: #f5f5f5; }
    .chat-name { font-weight: 600; font-size: 14px; }
    .chat-preview { font-size: 13px; color: #999; margin-top: 4px; }
    .main { flex: 1; display: flex; flex-direction: column; }
    .header { background: #fff; padding: 12px 20px; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; gap: 12px; }
    .header-avatar { width: 40px; height: 40px; border-radius: 50%; background: #5181b8; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .header-info h3 { font-size: 15px; font-weight: 600; }
    .header-info p { font-size: 13px; color: #999; }
    .header-actions { margin-left: auto; display: flex; gap: 8px; }
    .icon-btn { width: 36px; height: 36px; border-radius: 50%; background: #f5f5f5; border: none; cursor: pointer; font-size: 16px; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 60%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
    .msg-their { background: #fff; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg-own { background: #d8e8f5; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg-sender { font-size: 12px; color: #5181b8; font-weight: 600; margin-bottom: 4px; }
    .msg-own .msg-sender { display: none; }
    .msg-time { font-size: 11px; color: #999; text-align: right; margin-top: 4px; }
    .input-area { background: #fff; padding: 12px 20px; border-top: 1px solid #e5e5e5; display: flex; gap: 10px; }
    .input-area input { flex: 1; background: #f5f5f5; border: none; padding: 12px 18px; border-radius: 24px; font-size: 15px; }
    .input-area input:focus { outline: 2px solid #5181b8; }
    .send-btn { width: 44px; height: 44px; border-radius: 50%; background: #5181b8; border: none; cursor: pointer; font-size: 18px; color: #fff; }
    .send-btn:disabled { background: #ccc; }
    .config-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .config-modal.hidden { display: none; }
    .config-box { background: #fff; border-radius: 12px; padding: 24px; width: 340px; }
    .config-box h3 { font-size: 18px; color: #5181b8; margin-bottom: 20px; }
    .config-box label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
    .config-box input { width: 100%; background: #f5f5f5; border: 2px solid transparent; padding: 12px 15px; border-radius: 8px; font-size: 14px; margin-bottom: 12px; }
    .config-box input:focus { border-color: #5181b8; outline: none; }
    .config-box button { width: 100%; background: #5181b8; color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .config-box button:hover { background: #285689; }
    .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #999; }
    .loading::after { content: ''; width: 20px; height: 20px; border: 2px solid #5181b8; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-header">💬 Сообщения <span id="msgCount" style="float:right">0</span></div>
      <div class="chat-list" id="chatList"></div>
    </div>
    <div class="main">
      <div class="header">
        <div class="header-avatar" id="headerAvatar">G</div>
        <div class="header-info">
          <h3 id="headerName">GitHub Messenger</h3>
          <p id="headerStatus">Введите данные</p>
        </div>
        <div class="header-actions">
          <button class="icon-btn" onclick="openConfig()">⚙️</button>
        </div>
      </div>
      <div class="messages" id="messages"><div class="loading">Загрузка...</div></div>
      <div class="input-area">
        <input type="text" id="msgInput" placeholder="Напишите сообщение...">
        <button class="send-btn" id="sendBtn" onclick="sendMsg()" disabled>➤</button>
      </div>
    </div>
  </div>

  <div class="config-modal" id="configModal">
    <div class="config-box">
      <h3>⚙️ Подключение</h3>
      <label>Репозиторий</label>
      <input type="text" id="cfgRepo" placeholder="owner/repo">
      <label>Ваш username GitHub</label>
      <input type="text" id="cfgUser" placeholder="username">
      <label>Токен (необязательно)</label>
      <input type="password" id="cfgToken" placeholder="ghp_...">
      <button onclick="doConnect()">Подключиться</button>
    </div>
  </div>

  <script>
    const REPO_KEY = 'ghm_repo';
    const USER_KEY = 'ghm_username';
    const TOKEN_KEY = 'ghm_token';
    const LABEL = 'message';
    const API = 'https://api.github.com';

    let repo = '', user = '', tok = '', msgs = [];

    document.getElementById('cfgRepo').value = localStorage.getItem(REPO_KEY) || 'PerfLite/Messendjer';
    document.getElementById('cfgUser').value = localStorage.getItem(USER_KEY) || '';
    document.getElementById('cfgToken').value = localStorage.getItem(TOKEN_KEY) || '';

    function openConfig() {
      document.getElementById('configModal').classList.remove('hidden');
    }

    async function gh(path) {
      const h = { 'Accept': 'application/vnd.github+json' };
      if (tok) h['Authorization'] = 'Bearer ' + tok;
      const r = await fetch(API + path, { headers: h });
      if (!r.ok) {
        const e = await r.json().catch(() => ({}));
        throw new Error(e.message || 'HTTP ' + r.status);
      }
      return r.json();
    }

    async function doConnect() {
      repo = document.getElementById('cfgRepo').value.trim();
      user = document.getElementById('cfgUser').value.trim();
      tok = document.getElementById('cfgToken').value.trim();

      if (!repo) { alert('Введите репозиторий'); return; }
      if (!user) { alert('Введите username'); return; }

      localStorage.setItem(REPO_KEY, repo);
      localStorage.setItem(USER_KEY, user);
      if (tok) localStorage.setItem(TOKEN_KEY, tok);

      document.getElementById('configModal').classList.add('hidden');
      document.getElementById('messages').innerHTML = '<div class="loading">Подключение...</div>';

      try {
        msgs = await gh('/repos/' + repo + '/issues?labels=' + LABEL + '&state=open&per_page=100&sort=created&direction=asc');
        showAll();
        document.getElementById('sendBtn').disabled = false;
        setInterval(refresh, 8000);
      } catch (e) {
        document.getElementById('messages').innerHTML = '<div class="loading" style="color:red">Ошибка: ' + e.message + '</div>';
        openConfig();
      }
    }

    function showAll() {
      document.getElementById('headerAvatar').textContent = user.charAt(0).toUpperCase();
      document.getElementById('headerName').textContent = repo;
      document.getElementById('headerStatus').textContent = msgs.length + ' сообщений';
      document.getElementById('msgCount').textContent = msgs.length;

      const list = document.getElementById('chatList');
      list.innerHTML = '';
      const byUser = {};
      msgs.forEach(m => {
        const a = m.user?.login || '?';
        if (!byUser[a]) byUser[a] = [];
        byUser[a].push(m);
      });
      Object.entries(byUser).forEach(([u, arr]) => {
        const last = arr[arr.length - 1];
        const div = document.createElement('div');
        div.className = 'chat-item';
        div.innerHTML = '<div class="chat-name">' + u + '</div><div class="chat-preview">' + (last.body || '').substring(0, 40) + '</div>';
        div.onclick = () => showUser(u);
        list.appendChild(div);
      });

      const msgsDiv = document.getElementById('messages');
      msgsDiv.innerHTML = '';
      msgs.forEach(m => showMsg(m));

      refresh = () => gh('/repos/' + repo + '/issues?labels=' + LABEL + '&state=open&per_page=100&sort=created&direction=asc')
        .then(n => { if (n.length !== msgs.length) { msgs = n; showAll(); } });
    }

    function showMsg(m) {
      const isOwn = (m.user?.login || '').toLowerCase() === user.toLowerCase();
      const div = document.createElement('div');
      div.className = 'msg msg-' + (isOwn ? 'own' : 'their');
      const t = new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      div.innerHTML = '<div class="msg-sender">' + m.user?.login + '</div><div>' + m.body + '</div><div class="msg-time">' + t + '</div>';
      document.getElementById('messages').appendChild(div);
    }

    function showUser(u) {
      document.getElementById('headerAvatar').textContent = u.charAt(0).toUpperCase();
      document.getElementById('headerName').textContent = u;
      document.getElementById('headerStatus').textContent = 'Фильтр по ' + u;
      const msgsDiv = document.getElementById('messages');
      msgsDiv.innerHTML = '';
      msgs.filter(m => (m.user?.login || '') === u).forEach(m => showMsg(m));
    }

    async function sendMsg() {
      const text = document.getElementById('msgInput').value.trim();
      if (!text) return;
      document.getElementById('sendBtn').disabled = true;
      try {
        await gh('/repos/' + repo + '/issues', {
          method: 'POST',
          headers: { 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json', 'Authorization': tok ? 'Bearer ' + tok : '' },
          body: JSON.stringify({ title: user + ': ' + Date.now(), body: text, labels: [LABEL] })
        });
        document.getElementById('msgInput').value = '';
        msgs = await gh('/repos/' + repo + '/issues?labels=' + LABEL + '&state=open&per_page=100&sort=created&direction=asc');
        showAll();
      } catch (e) {
        alert('Ошибка: ' + e.message);
      }
      document.getElementById('sendBtn').disabled = false;
    }

    document.getElementById('msgInput').onkeydown = e => { if (e.key === 'Enter') sendMsg(); };
  </script>
</body>
</html>
