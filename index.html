<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skyrim True Believer - STB</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; min-height: 100vh; color: #c9d1d9; }
    
    .header {
      background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
      padding: 30px 20px;
      border-bottom: 1px solid #30363d;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    
    .logo {
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(135deg, #58a6ff, #f78166);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .version {
      background: #238636;
      color: #fff;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
    }
    
    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .link-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .link-btn:hover { background: #30363d; border-color: #58a6ff; }
    .link-btn.discord { background: #5865F2; border-color: #5865F2; color: #fff; }
    .link-btn.boosty { background: #ff4f00; border-color: #ff4f00; color: #fff; }
    .link-btn.patreon { background: #ff424d; border-color: #ff424d; color: #fff; }
    
    .main { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    
    .section-title {
      font-size: 28px;
      font-weight: 700;
      color: #f0f6fc;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .section-title::before {
      content: '';
      width: 4px;
      height: 32px;
      background: linear-gradient(180deg, #58a6ff, #f78166);
      border-radius: 2px;
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }
    
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .card:hover { border-color: #58a6ff; transform: translateY(-2px); }
    
    .card-icon {
      font-size: 36px;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #21262d;
      border-radius: 12px;
    }
    
    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: #f0f6fc;
    }
    
    .card-desc {
      font-size: 13px;
      color: #8b949e;
      margin-top: 4px;
    }
    
    .footer {
      background: #161b22;
      padding: 30px 20px;
      text-align: center;
      border-top: 1px solid #30363d;
      margin-top: 60px;
    }
    
    .footer p { font-size: 14px; color: #8b949e; }
    
    @media (max-width: 600px) {
      .logo { font-size: 28px; }
      .grid { grid-template-columns: 1fr; }
      .links { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-content">
      <div class="logo">⚔️ Skyrim True Believer</div>
      <div class="version">v2.6.3</div>
      <div class="links">
        <a href="https://skytb.ru/" target="_blank" class="link-btn">🌐 Сайт</a>
        <a href="https://discord.gg/stb" target="_blank" class="link-btn discord">💬 Discord</a>
        <a href="https://boosty.to/skyrimtruebeliever" target="_blank" class="link-btn boosty">❤️ Boosty</a>
        <a href="https://www.patreon.com/skyrimtruebeliever" target="_blank" class="link-btn patreon">⭐ Patreon</a>
        <a href="https://www.nexusmods.com/skyrimspecialedition/mods/xxxxx" target="_blank" class="link-btn">📦 Nexus Mods</a>
      </div>
    </div>
  </div>
  
  <div class="main">
    <div class="section-title">📚 База знаний</div>
    <div class="grid" id="baseGrid"></div>
    
    <div class="section-title">⚔️ Игровые данные</div>
    <div class="grid" id="gameGrid"></div>
  </div>
  
  <div class="footer">
    <p>Skyrim True Believer © 2026 — Геймплейная сборка для Skyrim Special Edition</p>
  </div>

  <script>
    const baseItems = [
      { icon: '📚', title: 'База', desc: 'Основные данные и механики' },
      { icon: '🗿', title: 'Расы/Камни', desc: 'Расы и камни судьбы' },
      { icon: '😇', title: 'Аэдра', desc: 'Боги Аэдра' },
      { icon: '😈', title: 'Даэдра', desc: 'Принцы Даэдра' },
    ];
    
    const gameItems = [
      { icon: '🧛🐺', title: 'Проклятые', desc: 'Вампиры и ликантропы' },
      { icon: '⭐', title: 'Ветки', desc: 'Древа навыков' },
      { icon: '🧪', title: 'Расходники', desc: 'Зелья, еда, инградиенты' },
      { icon: '✨', title: 'Зачарования', desc: 'Зачарования предметов' },
      { icon: '⚔️', title: 'Снаряжение', desc: 'Оружие и броня' },
      { icon: '💎', title: 'Уники', desc: 'Уникальные предметы' },
      { icon: '🌈', title: 'Закл/Туумы', desc: 'Заклинания и туумы' },
      { icon: '👻', title: 'Самоны', desc: 'Самонавы' },
      { icon: '⛰️', title: 'Данж лист', desc: 'Список подземелий' },
      { icon: '💰', title: 'Награды', desc: 'Награды за квесты' },
      { icon: '🥇', title: 'Сложность', desc: 'Система сложности' },
      { icon: '🏆', title: 'Эффекты', desc: 'Эффекты и таланты' },
    ];
    
    function renderGrid(items, gridId) {
      const grid = document.getElementById(gridId);
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<div class="card-icon">${item.icon}</div><div><div class="card-title">${item.title}</div><div class="card-desc">${item.desc}</div></div>`;
        grid.appendChild(card);
      });
    }
    
    renderGrid(baseItems, 'baseGrid');
    renderGrid(gameItems, 'gameGrid');
  </script>
</body>
</html>
