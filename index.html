      margin-bottom: 40px;

      background: #161b22;
      border: 1px solid #30363d;

      padding: 24px;

      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .card:hover { border-color: #58a6ff; transform: translateY(-2px); }
    .card.active { border-color: #58a6ff; background: #21262d; }

      font-size: 36px;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #21262d;
      border-radius: 12px;
    }
    
    .card-title { font-size: 18px; font-weight: 600; color: #f0f6fc; }
    .card-desc { font-size: 13px; color: #8b949e; margin-top: 4px; }
    
    .btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s;
      display: inline-block;
    }
    
    .btn:hover { background: #30363d; border-color: #58a6ff; transform: translateY(-2px); }
    
    .content-panel {
      display: none;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 40px;
    }
    
    .content-panel.show { display: block; }
    
    .content-panel h2 { color: #f0f6fc; margin-bottom: 16px; font-size: 24px; }
    .content-panel p { color: #8b949e; line-height: 1.6; margin-bottom: 12px; }
    .content-panel table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    .content-panel th, .content-panel td { border: 1px solid #30363d; padding: 10px; text-align: left; }
    .content-panel th { background: #21262d; color: #f0f6fc; font-weight: 700; }

    .content-panel td strong { color: #58a6ff; }

    .content-panel table td:nth-child(2) { color: #7ee787; }

    .content-panel p { color: #c9d1d9; line-height: 1.8; }
    .content-panel h3 { color: #f0f6fc; margin-top: 24px; margin-bottom: 12px; }
    .content-panel h4 { color: #58a6ff; margin-top: 16px; margin-bottom: 8px; }
    .content-panel em { color: #8b949e; font-size: 14px; }

        <p><strong>Сопротивления:</strong> Система пересчёта без жёсткого ограничения. Бонусы уменьшаются постепенно каждые 100 единиц.</p>
        <p><strong>Перки:</strong> Дают значительные бонусы к характеристикам. Изучайте описания перков в ветках.</p>
        <p><strong>Расовые бонусы:</strong> Теперь можно выбрать при старте из нескольких вариантов.</p>
        <p><strong>Заклинания усиления:</strong> "Трансмутация мускулов" и "Магическая броня" увеличивают здоровье и броню. "Львиное сердце" увеличивает запас сил.</p>
        <p><strong>Бонусы крафта:</strong> Алхимия, зачарование и кузнечное дело дают существенные бонусы к прохождению.</p>`
      }
    };
    
    let currentOpen = null;
    
    function showContent(id) {
      const contentDiv = document.getElementById('baseContent');
      const data = contentData[id];
      
      if (!data) return;
      
      if (currentOpen === id) {
        contentDiv.innerHTML = '';
        currentOpen = null;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        return;
      }
      
      contentDiv.innerHTML = `<div class="content-panel show">
        <button class="close-btn" onclick="closeContent()">×</button>
        <h2>${data.title}</h2>
        ${data.content}
      </div>`;
      
      document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
      event.target.closest('.card').classList.add('active');
      currentOpen = id;
      
      contentDiv.scrollIntoView({ behavior: 'smooth' });
    }
    
    function closeContent() {
      document.getElementById('baseContent').innerHTML = '';
      currentOpen = null;
      document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    }
    
    function renderGrid(items, gridId, isGame = false) {
      const grid = document.getElementById(gridId);
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => showContent(item.id);
        card.innerHTML = `<div class="card-icon">${item.icon}</div><div><div class="card-title">${item.title}</div><div class="card-desc">${item.desc}</div></div>`;
        grid.appendChild(card);
      });
    }
    
    renderGrid(baseItems, 'baseGrid');
    renderGrid(gameItems, 'gameGrid');
  </script>
</body>
